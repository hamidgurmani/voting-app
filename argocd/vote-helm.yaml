apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vote-helm
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/hamidgurmani/voting-app.git
    targetRevision: main
    path: infra/helm

    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: helm-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
