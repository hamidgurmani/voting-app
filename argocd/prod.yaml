apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voting-app-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/<your-username>/voting-app.git
    targetRevision: HEAD
    path: infra/k8s/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: voting-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
