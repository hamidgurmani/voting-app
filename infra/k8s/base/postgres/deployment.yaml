apiVersion: apps/v1
kind: Deployment
metadata: 
  name: postgres
  namespace: voting-app

spec: 
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1  
  selector: 
    matchLabels: 
      app: postgres
  template: 
    metadata: 
      labels:
        app: postgres
    spec:
      containers: 
        - name: postgres
          image: postgres:15-alpine
          ports: 
            - containerPort: 5432
          
          env: 
            - name: POSTGRES_USER 
              valueFrom: 
                secretKeyRef: 
                  name: voting-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom: 
                secretKeyRef: 
                  name: voting-secret
                  key: POSTGRES_PASSWORD
               
            - name: POSTGRES_DB
              valueFrom: 
                secretKeyRef:
                  name: voting-secret
                  key: POSTGRES_DB

          volumeMounts: 
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
             
          resources:
            requests: 
              memory: "32Mi"
              cpu: "100m"
            limits: 
              memory: "64Mi"
              cpu: "200m"

      volumes: 
        - name: postgres-storage
          persistentVolumeClaim: 
            claimName: postgres-pvc
