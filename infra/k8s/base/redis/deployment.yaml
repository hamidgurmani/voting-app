apiVersion: apps/v1
kind: Deployment
metadata: 
  name: redis
  namespace: voting-app

spec: 
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1  
  selector: 
    matchLabels: 
      app: redis
  template: 
    metadata: 
      labels: 
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: 
            - containerPort: 6379
          resources: 
            requests: 
              memory: "64Mi"
              cpu: "250m"
            limits: 
              memory: "128Mi"
              cpu: "500m"
           
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 5

          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5      
