# infra/k8s/overlays/staging/kustomization.yaml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: voting-app-staging  
resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: vote
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
