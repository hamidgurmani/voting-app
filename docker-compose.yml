version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./healthchecks:/healthchecks
    ports:
      - "5432:5432"

  vote:
    build: ./vote
    restart: always
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      OPTION_A: ${OPTION_A}
      OPTION_B: ${OPTION_B}
    depends_on:
      - redis

  result:
    build: ./result
    restart: always
    ports:
      - "5001:4000"
    environment:
      POSTGRES_HOST: db
    depends_on:
      - db

  worker:
    build: ./worker
    restart: always
    environment:
      REDIS_HOST: redis
      POSTGRES_HOST: db
    depends_on:
      - redis
      - db

volumes:
  db-data:
